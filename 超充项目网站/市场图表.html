<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="stylesheet" href="../玄金水墨主题.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场分析 - 千站液冷超充项目</title>
</head>
<body>
    <nav class="top-nav">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html">← 返回导航中心</a>
            <a href="../联系合作.html" style="color: var(--primary-gold);">联系合作 →</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="hero-banner fade-in">
            <div class="segment-icon" style="margin: 0 auto 30px;">🌍</div>
            <h1 style="font-size: 48px; margin-bottom: 20px;">市场分析</h1>
            <p style="font-size: 20px; color: var(--paper-beige); max-width: 900px; margin: 0 auto;">Market Analysis</p>
        </div>

        <section class="fade-in">
            <h2>市场趋势</h2>
            <div class="grid grid-2">
                <div class="card">
                    <h3>🚗 新能源汽车增长</h3>
                    <p style="color: var(--paper-beige);">新能源汽车销量持续攀升，2025年预计突破1500万辆</p>
                    <div style="background: rgba(212, 175, 55, 0.2); padding: 20px; border-radius: 10px; margin-top: 15px; text-align: center;">
                        <span style="font-size: 32px; color: var(--primary-gold); font-weight: bold;">40%+</span>
                        <p style="color: var(--paper-beige); margin-top: 5px;">年增长率</p>
                    </div>
                </div>
                <div class="card">
                    <h3>⚡ 充电基础设施需求</h3>
                    <p style="color: var(--paper-beige);">充电桩数量快速增长，超充站需求旺盛</p>
                    <div style="background: rgba(212, 175, 55, 0.2); padding: 20px; border-radius: 10px; margin-top: 15px; text-align: center;">
                        <span style="font-size: 32px; color: var(--primary-gold); font-weight: bold;">1000万+</span>
                        <p style="color: var(--paper-beige); margin-top: 5px;">充电桩目标</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="advantages-section fade-in">
            <h2>竞争优势</h2>
            <div class="advantages-grid">
                <div class="advantage-item">
                    <div class="advantage-icon">🔧</div>
                    <h3>技术领先</h3>
                    <p>华为液冷超充技术，行业领先</p>
                </div>
                <div class="advantage-item">
                    <div class="advantage-icon">⚡</div>
                    <h3>充电速度</h3>
                    <p>600kW功率，充电速度最快</p>
                </div>
                <div class="advantage-item">
                    <div class="advantage-icon">🌍</div>
                    <h3>环保节能</h3>
                    <p>光储充一体，绿色环保</p>
                </div>
                <div class="advantage-item">
                    <div class="advantage-icon">🤖</div>
                    <h3>智能运维</h3>
                    <p>AIoT技术，智能管理</p>
                </div>
            </div>
        </section>

        <footer style="text-align: center; padding: 40px 0; color: var(--paper-beige); opacity: 0.7;">
            <p>© 2025 KeyTrader. All rights reserved.</p>
        </footer>
    </div>

    <a href="../index.html" class="back-to-home">← 返回首页</a>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, {threshold: 0.1, rootMargin: '0px 0px -50px 0px'});
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
</body>
</html>
