<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="stylesheet" href="../玄金水墨主题.css">

<body>
    <nav class="top-nav">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html">← 返回导航中心</a>
            <a href="../联系合作.html" style="color: var(--primary-gold);">联系合作 →</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="hero-banner fade-in">

            <h1 style="font-size: 48px; margin-bottom: 20px;">官方商业计划书</h1>
            <p style="font-size: 20px; color: var(--paper-beige); max-width: 900px; margin: 0 auto;">Business Plan</p>

        <section class="fade-in">
            <h2>商业计划书内容</h2>
            <div class="grid grid-2">
                <div class="card">
                    <h3>📖 市场分析</h3>

                    <p>华为液冷超充技术介绍、系统架构、技术优势说明</p>

                    <p>详细的投资测算、收入预测、现金流分析、IRR计算</p>
                </div>
                <div class="card">
                    <h3>⚠️ 风险分析</h3>
                    <p>项目风险识别、应对策略、风险控制措施</p>
                </div>
            </div>
        </section>

        <section class="cta-section fade-in" style="background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(212, 175, 55, 0.05) 100%); padding: 80px 40px; border-radius: 20px; text-align: center; margin: 80px 0; border: 2px solid rgba(212, 175, 55, 0.3);">

        <footer style="text-align: center; padding: 40px 0; color: var(--paper-beige); opacity: 0.7;">
            <p>© 2025 KeyTrader. All rights reserved.</p>
        </footer>
    </div>

    <a href="../index.html" class="back-to-home">← 返回首页</a>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, {threshold: 0.1, rootMargin: '0px 0px -50px 0px'});
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
